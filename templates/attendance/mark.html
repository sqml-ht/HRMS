<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance / HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="page-title">Mark Attendance</div>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbar-date"></span>
        </div>
    </header>
    <div class="content-area">
        <div id="alert-area"></div>

        <div class="card form-card">
            <div class="form-group" style="max-width:300px">
                <label>Attendance Date *</label>
                <input type="date" id="att_date">
            </div>

            <h4 style="margin:1.5rem 0 1rem;color:var(--regal-navy)">Select Employees &amp; Status</h4>

            <div style="margin-bottom:1rem">
                <label style="cursor:pointer;display:flex;align-items:center;gap:.5rem">
                    <input type="checkbox" id="check-all"> <strong>Select All</strong>
                </label>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>✓</th><th>Employee</th><th>Status</th>
                        <th>Check In</th><th>Check Out</th><th>Overtime hrs</th>
                    </tr>
                </thead>
                <tbody id="emp-table-body">
                    <tr><td colspan="6" class="loading-row">Loading employees…</td></tr>
                </tbody>
            </table>

            <div class="form-actions">
                <a href="/attendance" class="btn-ghost">Cancel</a>
                <button onclick="saveAttendance()" class="btn-primary" id="save-btn">Save Attendance</button>
            </div>
        </div>
    </div>
</main>

<script src="/static/base.js"></script>
<script src="/static/sidebar.js"></script>
<script>
(async () => {
    const user = await initPage('attendance');
    if (!user) return;

    // Set default date to today
    const today = new Date().toISOString().split('T')[0];
    const dateInput = document.getElementById('att_date');
    dateInput.value = today;
    dateInput.max   = today;

    // Load employees
    try {
        const res  = await fetch('/api/attendance/employees');
        const data = await res.json();
        if (data.error) { showAlert(data.error); return; }

        const tbody = document.getElementById('emp-table-body');
        if (!data.employees || !data.employees.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-row">No active employees.</td></tr>';
            return;
        }

        tbody.innerHTML = data.employees.map(e => `
            <tr>
                <td><input type="checkbox" class="emp-check" data-id="${e.id}"></td>
                <td><strong>${e.name}</strong></td>
                <td>
                    <select id="status_${e.id}" class="filter-select" style="min-width:120px">
                        <option value="PRESENT">PRESENT</option>
                        <option value="ABSENT">ABSENT</option>
                        <option value="LATE">LATE</option>
                        <option value="HALF_DAY">HALF DAY</option>
                    </select>
                </td>
                <td><input type="time" id="check_in_${e.id}" class="filter-input" style="width:120px"></td>
                <td><input type="time" id="check_out_${e.id}" class="filter-input" style="width:120px"></td>
                <td><input type="number" id="overtime_${e.id}" min="0" step="0.5" value="0" class="filter-input" style="width:80px"></td>
            </tr>`).join('');

    } catch { showAlert('Failed to load employees.'); }
})();

document.getElementById('check-all').addEventListener('change', function () {
    document.querySelectorAll('.emp-check').forEach(c => c.checked = this.checked);
});

async function saveAttendance() {
    const att_date = document.getElementById('att_date').value;
    if (!att_date) { showAlert('Please select a date.'); return; }

    const checked = [...document.querySelectorAll('.emp-check:checked')];
    if (!checked.length) { showAlert('Please select at least one employee.'); return; }

    const records = checked.map(cb => {
        const id = cb.dataset.id;
        return {
            emp_id:    parseInt(id),
            status:    document.getElementById(`status_${id}`).value,
            check_in:  document.getElementById(`check_in_${id}`).value  || null,
            check_out: document.getElementById(`check_out_${id}`).value || null,
            overtime:  parseFloat(document.getElementById(`overtime_${id}`).value) || 0,
        };
    });

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
        const res  = await fetch('/api/attendance', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ att_date, records })
        });
        const data = await res.json();
        if (data.success) {
            showAlert(`Attendance saved for ${data.count} employee(s).`, 'success');
            setTimeout(() => window.location.href = '/attendance', 1200);
        } else {
            showAlert(data.message || 'Failed to save attendance.');
            btn.disabled = false;
            btn.textContent = 'Save Attendance';
        }
    } catch {
        showAlert('Network error.');
        btn.disabled = false;
        btn.textContent = 'Save Attendance';
    }
}
</script>
</body>
</html>
