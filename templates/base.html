<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo">H</div>
        <div>
            <div class="brand-name">HRMS</div>
            <div class="brand-sub">Management Portal</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="/dashboard" class="nav-item" data-page="dashboard">
            <i class="fa-solid fa-gauge-high"></i> Dashboard
        </a>
        <a href="/employees" class="nav-item" data-page="employees">
            <i class="fa-solid fa-users"></i> Employees
        </a>
        <a href="/attendance" class="nav-item" data-page="attendance">
            <i class="fa-solid fa-clipboard-list"></i> Attendance
        </a>
        <a href="/payroll" class="nav-item" data-page="payroll">
            <i class="fa-solid fa-money-bill-wave"></i> Payroll
        </a>
        <div class="nav-section-label admin-only">Analytics</div>
        <a href="/reports" class="nav-item admin-only" data-page="reports">
            <i class="fa-solid fa-chart-bar"></i> Reports
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">U</div>
            <div>
                <div class="user-name" id="user-name">Loading…</div>
                <div class="user-role" id="user-role"></div>
            </div>
        </div>
        <a href="/change-password" class="footer-link"><i class="fa-solid fa-key"></i> Password</a>
        <button onclick="logout()" class="footer-link logout"><i class="fa-solid fa-power-off"></i> Logout</button>
    </div>
</aside>

<!-- Main -->
<main class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="page-title" id="page-title">Dashboard</div>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbar-date"></span>
        </div>
    </header>

    <div class="content-area">
        <div id="alert-area"></div>
        <div id="page-content"></div>
    </div>
</main>

<script src="/static/base.js"></script>
</body>
</html>
