<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS / Change Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-logo" style="background: var(--ocean-mist);">🔑</div>
            <h1>Set your password</h1>
            <p>Create a secure password to continue</p>
        </div>

        <div id="alert-area"></div>

        <div class="form-group">
            <label for="current_password">Current (temporary) password</label>
            <input type="password" id="current_password" placeholder="Your temporary password">
        </div>

        <div class="form-group">
            <label for="new_password">New password</label>
            <input type="password" id="new_password" placeholder="Minimum 8 characters" minlength="8">
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm new password</label>
            <input type="password" id="confirm_password" placeholder="Repeat your new password">
            <span class="field-hint" id="match-hint"></span>
        </div>

        <div class="password-rules">
            <p class="rules-title">Password requirements</p>
            <ul>
                <li id="r-len">At least 8 characters</li>
                <li id="r-upper">One uppercase letter</li>
                <li id="r-num">One number</li>
            </ul>
        </div>

        <button class="btn-primary btn-ocean" id="submit-btn" onclick="doChange()">
            Update password
        </button>

        <p class="auth-footer"><a href="/login">← Back to login</a></p>
    </div>
</div>

<script>
function showAlert(msg, type = 'error') {
    const icon = type === 'success'
        ? '✓' : '⚠';
    document.getElementById('alert-area').innerHTML =
        `<div class="alert alert-${type}">${icon} ${msg}</div>`;
}

function checkRule(id, ok) {
    document.getElementById(id).style.color = ok ? '#6abea7' : '#aaa';
}

document.getElementById('new_password').addEventListener('input', function () {
    const v = this.value;
    checkRule('r-len',   v.length >= 8);
    checkRule('r-upper', /[A-Z]/.test(v));
    checkRule('r-num',   /[0-9]/.test(v));
});

document.getElementById('confirm_password').addEventListener('input', function () {
    const match = this.value === document.getElementById('new_password').value;
    const hint  = document.getElementById('match-hint');
    hint.textContent = match ? '✓ Passwords match' : '✗ Passwords do not match';
    hint.style.color = match ? '#6abea7' : '#C33149';
});

async function doChange() {
    const current  = document.getElementById('current_password').value;
    const newPass  = document.getElementById('new_password').value;
    const confirm  = document.getElementById('confirm_password').value;

    if (!current || !newPass || !confirm) { showAlert('Please fill all fields.'); return; }
    if (newPass !== confirm)              { showAlert('Passwords do not match.'); return; }
    if (newPass.length < 8)              { showAlert('Password must be at least 8 characters.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
        const res  = await fetch('/api/change-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ current_password: current, new_password: newPass, confirm_password: confirm })
        });
        const data = await res.json();
        if (data.success) {
            showAlert('Password updated! Redirecting…', 'success');
            setTimeout(() => window.location.href = data.redirect || '/dashboard', 1200);
        } else {
            showAlert(data.message || 'Failed to update password.');
            btn.disabled = false;
            btn.textContent = 'Update password';
        }
    } catch (e) {
        showAlert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Update password';
    }
}
</script>
</body>
</html>
