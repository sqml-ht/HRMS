<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Form — HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="page-title" id="page-title">Add Employee</div>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbar-date"></span>
        </div>
    </header>
    <div class="content-area">
        <div id="alert-area"></div>

        <div class="form-page">
            <div class="card form-card">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="first_name" required placeholder="e.g. Alice">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="last_name" required placeholder="e.g. Johnson">
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required placeholder="alice@hrms.com">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="phone" placeholder="0300-1234567">
                    </div>
                    <div class="form-group">
                        <label>Salary (PKR) *</label>
                        <input type="number" id="salary" step="0.01" required placeholder="50000">
                    </div>
                    <div class="form-group">
                        <label>Hire Date</label>
                        <input type="date" id="hire_date">
                    </div>
                    <div class="form-group">
                        <label>Department *</label>
                        <select id="dept_id" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Designation *</label>
                        <select id="desig_id" required>
                            <option value="">Select Designation</option>
                        </select>
                    </div>
                    <div class="form-group form-group-full">
                        <label>Reports To (Manager)</label>
                        <select id="manager_id">
                            <option value="">No Manager</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/employees" class="btn-ghost">Cancel</a>
                    <button onclick="submitForm()" class="btn-primary" id="submit-btn">Add Employee</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="/static/base.js"></script>
<script src="/static/sidebar.js"></script>
<script>
// Determine if editing: URL pattern /employees/edit/123
const pathParts = window.location.pathname.split('/');
const isEdit    = pathParts.includes('edit');
const empId     = isEdit ? pathParts[pathParts.length - 1] : null;

document.getElementById('page-title').textContent = isEdit ? 'Edit Employee' : 'Add Employee';
document.getElementById('submit-btn').textContent  = isEdit ? 'Update Employee' : 'Add Employee';

(async () => {
    await initPage('employees');

    if (isEdit) {
        // Load employee data + form data together
        try {
            const res  = await fetch(`/api/employees/${empId}`);
            const data = await res.json();
            if (data.error) { showAlert(data.error); return; }

            populateDropdowns(data.departments, data.designations, data.managers);

            const e = data.employee;
            document.getElementById('first_name').value  = e.first_name  || '';
            document.getElementById('last_name').value   = e.last_name   || '';
            document.getElementById('email').value       = e.email       || '';
            document.getElementById('phone').value       = e.phone       || '';
            document.getElementById('salary').value      = e.salary      || '';
            document.getElementById('hire_date').value   = e.hire_date   || '';
            document.getElementById('dept_id').value     = e.dept_id     || '';
            document.getElementById('desig_id').value    = e.desig_id    || '';
            document.getElementById('manager_id').value  = e.manager_id  || '';
        } catch { showAlert('Failed to load employee data.'); }
    } else {
        // Just load form data (departments, designations, managers)
        try {
            const res  = await fetch('/api/employees/form-data');
            const data = await res.json();
            if (data.error) { showAlert(data.error); return; }
            populateDropdowns(data.departments, data.designations, data.managers);
        } catch { showAlert('Failed to load form data.'); }
    }
})();

function populateDropdowns(departments, designations, managers) {
    const deptSel  = document.getElementById('dept_id');
    const desigSel = document.getElementById('desig_id');
    const mgrSel   = document.getElementById('manager_id');

    departments.forEach(d => deptSel.add(new Option(d.name, d.id)));
    designations.forEach(d => desigSel.add(new Option(d.title, d.id)));
    managers.forEach(m => mgrSel.add(new Option(m.name, m.id)));
}

async function submitForm() {
    const payload = {
        first_name:  document.getElementById('first_name').value.trim(),
        last_name:   document.getElementById('last_name').value.trim(),
        email:       document.getElementById('email').value.trim(),
        phone:       document.getElementById('phone').value.trim(),
        salary:      document.getElementById('salary').value,
        hire_date:   document.getElementById('hire_date').value,
        dept_id:     document.getElementById('dept_id').value,
        desig_id:    document.getElementById('desig_id').value,
        manager_id:  document.getElementById('manager_id').value,
    };

    if (!payload.first_name || !payload.last_name || !payload.email ||
        !payload.salary || !payload.dept_id || !payload.desig_id) {
        showAlert('Please fill all required fields.');
        return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
        const url    = isEdit ? `/api/employees/${empId}` : '/api/employees';
        const method = isEdit ? 'PUT' : 'POST';
        const res    = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
            showAlert(isEdit ? 'Employee updated!' : 'Employee added!', 'success');
            setTimeout(() => window.location.href = '/employees', 1000);
        } else {
            showAlert(data.message || 'Failed to save.');
            btn.disabled = false;
            btn.textContent = isEdit ? 'Update Employee' : 'Add Employee';
        }
    } catch {
        showAlert('Network error.');
        btn.disabled = false;
        btn.textContent = isEdit ? 'Update Employee' : 'Add Employee';
    }
}
</script>
</body>
</html>
