<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Payroll — HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="page-title">Generate Payroll</div>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbar-date"></span>
        </div>
    </header>
    <div class="content-area">
        <div id="alert-area"></div>

        <div class="card form-card">
            <div class="card-header">
                <h3>Generate Monthly Payroll</h3>
                <p style="color:var(--text-muted);font-size:.85rem;margin-top:.3rem">
                    Auto-calculates: Basic + Overtime Bonus − 5% Deductions − 10% Tax
                </p>
            </div>

            <div class="form-grid" style="margin-top:1.25rem">
                <div class="form-group">
                    <label>Pay Month *</label>
                    <select id="pay_month" class="filter-select" style="width:100%">
                        <option>January</option><option>February</option><option>March</option>
                        <option>April</option><option>May</option><option>June</option>
                        <option>July</option><option>August</option><option>September</option>
                        <option>October</option><option>November</option><option>December</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pay Year *</label>
                    <select id="pay_year" class="filter-select" style="width:100%">
                        <option value="2024">2024</option>
                        <option value="2025" selected>2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
            </div>

            <h4 style="margin:1.5rem 0 1rem;color:var(--regal-navy)">Select Employees</h4>
            <div style="margin-bottom:1rem">
                <label style="cursor:pointer;display:flex;align-items:center;gap:.5rem">
                    <input type="checkbox" id="check-all"> <strong>Select All</strong>
                </label>
            </div>

            <table class="data-table">
                <thead>
                    <tr><th></th><th>Employee</th><th>Basic Salary (PKR)</th><th>Note</th></tr>
                </thead>
                <tbody id="emp-table-body">
                    <tr><td colspan="4" class="loading-row">Loading employees…</td></tr>
                </tbody>
            </table>

            <div class="form-actions">
                <a href="/payroll" class="btn-ghost">Cancel</a>
                <button onclick="generatePayroll()" class="btn-primary" id="gen-btn">Generate Payroll</button>
            </div>
        </div>
    </div>
</main>

<script src="/static/base.js"></script>
<script src="/static/sidebar.js"></script>
<script>
(async () => {
    await initPage('payroll');

    // Set current month as default
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    document.getElementById('pay_month').value = months[new Date().getMonth()];

    try {
        const res  = await fetch('/api/payroll/employees');
        const data = await res.json();
        if (data.error) { showAlert(data.error); return; }

        const tbody = document.getElementById('emp-table-body');
        if (!data.employees || !data.employees.length) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-row">No active employees.</td></tr>';
            return;
        }

        tbody.innerHTML = data.employees.map(e => `
            <tr>
                <td><input type="checkbox" class="emp-check" data-id="${e.id}"></td>
                <td><strong>${e.name}</strong></td>
                <td>${fmtNum(e.salary)}</td>
                <td class="text-muted" style="font-size:.8rem">Bonus from overtime · 5% deduction · 10% tax</td>
            </tr>`).join('');

    } catch { showAlert('Failed to load employees.'); }
})();

document.getElementById('check-all').addEventListener('change', function () {
    document.querySelectorAll('.emp-check').forEach(c => c.checked = this.checked);
});

async function generatePayroll() {
    const pay_month = document.getElementById('pay_month').value;
    const pay_year  = parseInt(document.getElementById('pay_year').value);
    const checked   = [...document.querySelectorAll('.emp-check:checked')];

    if (!checked.length) { showAlert('Please select at least one employee.'); return; }

    const emp_ids = checked.map(cb => parseInt(cb.dataset.id));

    const btn = document.getElementById('gen-btn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    try {
        const res  = await fetch('/api/payroll/generate', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ pay_month, pay_year, emp_ids })
        });
        const data = await res.json();
        if (data.success) {
            showAlert(`Payroll generated for ${data.generated} employee(s).`, 'success');
            setTimeout(() => window.location.href = '/payroll', 1200);
        } else {
            showAlert(data.message || 'Failed to generate payroll.');
            btn.disabled = false;
            btn.textContent = 'Generate Payroll';
        }
    } catch {
        showAlert('Network error.');
        btn.disabled = false;
        btn.textContent = 'Generate Payroll';
    }
}
</script>
</body>
</html>
