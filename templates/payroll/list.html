<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll — HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="page-title">Payroll</div>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbar-date"></span>
        </div>
    </header>
    <div class="content-area">
        <div id="alert-area"></div>

        <div class="kpi-row" style="margin-bottom:1.5rem">
            <div class="kpi-card kpi-teal">
                <div class="kpi-icon"><i class="fa-solid fa-circle-check"></i></div>
                <div class="kpi-value" id="kpi-paid">—</div>
                <div class="kpi-label">Total Paid (This Year)</div>
            </div>
            <div class="kpi-card kpi-rose">
                <div class="kpi-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                <div class="kpi-value" id="kpi-pending">—</div>
                <div class="kpi-label">Pending Payroll</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="filter-bar">
                <select id="year-select" class="filter-select">
                    <option value="">All Years</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
                <select id="month-select" class="filter-select">
                    <option value="">All Months</option>
                    <option>January</option><option>February</option><option>March</option>
                    <option>April</option><option>May</option><option>June</option>
                    <option>July</option><option>August</option><option>September</option>
                    <option>October</option><option>November</option><option>December</option>
                </select>
                <button onclick="loadPayroll()" class="btn-sm btn-primary">Filter</button>
                <button onclick="clearFilters()" class="btn-sm btn-ghost">Clear</button>
            </div>
            <a href="/payroll/generate" class="btn-primary admin-only">+ Generate Payroll</a>
        </div>

        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Employee</th><th>Period</th><th>Basic Pay</th>
                        <th>Bonus</th><th>Deductions</th><th>Tax</th>
                        <th>Net Pay</th><th>Status</th>
                        <th class="admin-only">Actions</th>
                    </tr>
                </thead>
                <tbody id="payroll-body">
                    <tr><td colspan="9" class="loading-row">Loading…</td></tr>
                </tbody>
            </table>
            <div class="table-footer" id="table-footer"></div>
        </div>
    </div>
</main>

<script src="/static/base.js"></script>
<script src="/static/sidebar.js"></script>
<script>
let pageUser = null;

(async () => {
    pageUser = await initPage('payroll');
    if (!pageUser) return;

    if (pageUser.role === 'EMPLOYEE') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    }

    await loadPayroll();
})();

async function loadPayroll() {
    const year  = document.getElementById('year-select').value;
    const month = document.getElementById('month-select').value;
    const params = new URLSearchParams();
    if (year)  params.set('year',  year);
    if (month) params.set('month', month);

    try {
        const res  = await fetch('/api/payroll?' + params);
        const data = await res.json();
        if (data.error) { showAlert(data.error); return; }

        document.getElementById('kpi-paid').textContent    = 'PKR ' + fmtNum(data.total_paid    || 0);
        document.getElementById('kpi-pending').textContent = 'PKR ' + fmtNum(data.total_pending || 0);

        const isAdmin = pageUser && ['ADMIN','HR'].includes(pageUser.role);
        const tbody   = document.getElementById('payroll-body');

        if (!data.records || !data.records.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="empty-row">No payroll records found.</td></tr>';
        } else {
            tbody.innerHTML = data.records.map(r => `
                <tr>
                    <td><strong>${r.emp_name}</strong></td>
                    <td>${r.month} ${r.year}</td>
                    <td>${fmtNum(r.basic)}</td>
                    <td>${fmtNum(r.bonus)}</td>
                    <td class="text-red">-${fmtNum(r.deductions)}</td>
                    <td class="text-red">-${fmtNum(r.tax)}</td>
                    <td><strong>${fmtNum(r.net)}</strong></td>
                    <td>${statusBadge(r.status)}</td>
                    <td class="actions admin-only">
                        ${isAdmin && r.status === 'PENDING' ? `
                            <button onclick="approvePayroll(${r.pay_id})" class="btn-xs btn-primary">Approve</button>
                            <button onclick="rejectPayroll(${r.pay_id})" class="btn-xs btn-danger">Reject</button>
                        ` : '<span class="text-muted">—</span>'}
                    </td>
                </tr>`).join('');
        }

        document.getElementById('table-footer').textContent =
            `${(data.records || []).length} record(s)`;

    } catch { showAlert('Failed to load payroll.'); }
}

async function approvePayroll(payId) {
    if (!confirm('Approve this payroll?')) return;
    await doAction(`/api/payroll/${payId}/approve`);
}

async function rejectPayroll(payId) {
    if (!confirm('Reject this payroll?')) return;
    await doAction(`/api/payroll/${payId}/reject`);
}

async function doAction(url) {
    try {
        const res  = await fetch(url, { method: 'POST' });
        const data = await res.json();
        if (data.success) { showAlert('Done!', 'success'); await loadPayroll(); }
        else showAlert(data.message || 'Action failed.');
    } catch { showAlert('Network error.'); }
}

function clearFilters() {
    document.getElementById('year-select').value  = '';
    document.getElementById('month-select').value = '';
    loadPayroll();
}
</script>
</body>
</html>
