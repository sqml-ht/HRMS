<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Summary — HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <main class="main-wrap">
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
                <div class="page-title">Attendance Summary Report</div>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="topbar-date"></span>
            </div>
        </header>
        <div class="content-area">
            <div id="alert-area"></div>

            <div class="card">
                <div class="card-header">
                    <h3>Employee Attendance Summary</h3>
                    <span class="sql-badge">CASE WHEN · COUNT · GROUP BY · ORDER BY</span>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Department</th>
                            <th>Present</th>
                            <th>Absent</th>
                            <th>Late</th>
                            <th>Half Day</th>
                            <th>OT (hrs)</th>
                            <th>Total Days</th>
                            <th>Attendance %</th>
                        </tr>
                    </thead>
                    <tbody id="att-body">
                        <tr>
                            <td colspan="9" class="loading-row">Loading…</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="margin-top:1rem">
                <a href="/reports" class="btn-ghost">← Back to Reports</a>
            </div>
        </div>
    </main>

    <script src="/static/base.js"></script>
    <script src="/static/sidebar.js"></script>
    <script>
        (async () => {
            await initPage('reports');
            
            try {
                const res = await fetch('/api/reports/attendance-summary');
                const data = await res.json();
                if (data.error) { showAlert(data.error); return; }

                const tbody = document.getElementById('att-body');
                if (!data.att_data || !data.att_data.length) {
                    tbody.innerHTML = '<tr><td colspan="9" class="empty-row">No data.</td></tr>';
                } else {
                    tbody.innerHTML = data.att_data.map(r => {
                        const pct = r.pct || 0;
                        const color = pct >= 80 ? 'var(--ocean-mist)' : pct >= 60 ? '#eab308' : 'var(--intense-cherry)';
                        return `<tr>
                    <td><strong>${r.name}</strong></td>
                    <td>${r.dept}</td>
                    <td class="text-green">${r.present || 0}</td>
                    <td class="text-red">${r.absent || 0}</td>
                    <td class="text-yellow">${r.late || 0}</td>
                    <td>${r.half_day || 0}</td>
                    <td>${r.overtime || 0}</td>
                    <td>${r.total || 0}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:.5rem">
                            <div style="flex:1;background:#eee;border-radius:4px;height:6px">
                                <div style="width:${pct}%;background:${color};height:6px;border-radius:4px"></div>
                            </div>
                            <span>${pct}%</span>
                        </div>
                    </td>
                </tr>`;
                    }).join('');
                }

            } catch { showAlert('Failed to load attendance summary.'); }
            try {
                const res = await fetch('/api/reports/attendance-summary');
                console.log('Status:', res.status);
                const text = await res.text();
                console.log('Raw response:', text);
                const data = JSON.parse(text);
                console.log('Data:', data);
                if (data.error) { showAlert(data.error); return; }
                // ... rest of code
            } catch (e) {
                showAlert('Failed to load attendance summary: ' + e.message);
                console.error(e);
            }
        })();

    </script>
</body>

</html>
