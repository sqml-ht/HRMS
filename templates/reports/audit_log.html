<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log / HRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="main-wrap">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="page-title">Audit Log</div>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbar-date"></span>
        </div>
    </header>
    <div class="content-area">
        <div id="alert-area"></div>

        <div class="card">
            <div class="card-header">
                <h3>System Audit Log</h3>
                <span class="sql-badge">Trigger-generated · Last 100 entries</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th><th>Table</th><th>Operation</th><th>Record ID</th>
                        <th>Old Value</th><th>New Value</th><th>Changed By</th><th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="audit-body">
                    <tr><td colspan="8" class="loading-row">Loading…</td></tr>
                </tbody>
            </table>
            <div class="table-footer" id="table-footer"></div>
        </div>

        <div style="margin-top:1rem">
            <a href="/reports" class="btn-ghost">← Back to Reports</a>
        </div>
    </div>
</main>

<script src="/static/base.js"></script>
<script src="/static/sidebar.js"></script>
<script>
(async () => {
    await initPage('reports');

    try {
        const res  = await fetch('/api/reports/audit-log');
        const data = await res.json();
        if (data.error) { showAlert(data.error); return; }

        const tbody = document.getElementById('audit-body');
        if (!data.logs || !data.logs.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-row">No audit records.</td></tr>';
        } else {
            tbody.innerHTML = data.logs.map(r => `
                <tr>
                    <td class="mono">${r.id}</td>
                    <td><span class="badge badge-blue">${r.table}</span></td>
                    <td>${statusBadge(r.op)}</td>
                    <td class="mono">${r.record_id}</td>
                    <td class="text-muted" style="font-size:.8rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.old}</td>
                    <td style="font-size:.8rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.new}</td>
                    <td class="mono">${r.by}</td>
                    <td>${r.at}</td>
                </tr>`).join('');
        }

        document.getElementById('table-footer').textContent =
            `${(data.logs || []).length} record(s)`;

    } catch { showAlert('Failed to load audit log.'); }
})();
</script>
</body>
</html>
